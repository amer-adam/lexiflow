server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: any path that isn't a real static file falls back to
    # index.html so client-side routes like /extension-connect and the
    # ?id=<jobId> deep link resolve instead of hitting a bare 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
