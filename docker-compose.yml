services:
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
        - VITE_AUTH0_DOMAIN=${VITE_AUTH0_DOMAIN}
        - VITE_AUTH0_CLIENT_ID=${VITE_AUTH0_CLIENT_ID}
        - VITE_AUTH0_AUDIENCE=${VITE_AUTH0_AUDIENCE}
    ports:
      - "4555:80"
    restart: unless-stopped
    depends_on:
      - backend-node
    # `docker compose up --watch frontend` rebuilds this image whenever a file
    # under ./frontend changes (node_modules/dist are ignored).
    develop:
      watch:
        - action: rebuild
          path: ./frontend
          ignore:
            - node_modules/
            - dist/
            - .parcel-cache/

  backend-node:
    image: ghcr.io/amer-adam/backend-node:latest
    build:
      context: ./backend-node
    ports:
      - "4556:4556"
    env_file:
      - .env
    # Reach the host's PostgreSQL from inside the container. This overrides the
    # DATABASE_URL in .env (which uses "localhost" for host/native runs).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql://lexiflow_user:lexiflow_password@host.docker.internal:5432/lexiflow_db?schema=public
      # Reach the FastAPI worker by its compose service name, not localhost
      # (inside this container "localhost" is backend-node itself).
      - PYTHON_API=http://backend-fastapi:4557
    restart: unless-stopped
    depends_on:
      - backend-fastapi

  backend-fastapi:
    build:
      context: ./backend-fastapi
    ports:
      - "4557:4557"
    environment:
      - TRANSLATION_API_URL=http://libretranslate:5000/translate
      # Which TTS backend /tts proxies to — "edge" (default, no GPU, the
      # edge-tts service below) or "cosyvoice" (GPU, the tts-service below;
      # see backend-fastapi/api.py's TTS_BACKEND switch). Both URLs are
      # always set so flipping TTS_BACKEND doesn't need any other env
      # change — just also bring up/down the matching service via its
      # profile (tts-service is profile-gated, see below).
      - TTS_BACKEND=edge
      - EDGE_TTS_API_URL=http://edge-tts:5050
      - EDGE_TTS_VOICE=zh-CN-XiaoxiaoNeural 
      - TTS_API_URL=http://tts-service:50000
      - FRONTEND_URL=${FRONTEND_URL}
      - OMP_NUM_THREADS=12
      - MKL_NUM_THREADS=12
    # Requires nvidia-container-toolkit on the host (see README/setup docs) —
    # without it Docker silently runs this on plain runc with no GPU access,
    # and faster-whisper/ctranslate2 fall back to (much slower) CPU inference.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    depends_on:
      - libretranslate
      - edge-tts

  # OpenAI-compatible wrapper around Microsoft Edge's cloud TTS
  # (github.com/travisvn/openai-edge-tts). Default TTS backend: no GPU, no
  # model download, reliable even for single-character words. Needs outbound
  # internet access (it calls Microsoft's service), unlike tts-service below.
  edge-tts:
    image: travisvn/openai-edge-tts:latest
    ports:
      - "4559:5050"
    environment:
      - DEFAULT_VOICE=zh-CN-XiaoxiaoNeural
      - DEFAULT_RESPONSE_FORMAT=wav
      - REQUIRE_API_KEY=false
    restart: unless-stopped

  # Fun-CosyVoice3-0.5B-2512 served by CosyVoice's own official FastAPI
  # server (see tts-service/Dockerfile) — a plain off-the-shelf container,
  # not merged into backend-fastapi, same shape as libretranslate below.
  # Only backend-fastapi talks to it; the frontend/backend-node never call
  # it directly. Opt-in: set TTS_BACKEND=cosyvoice on backend-fastapi above
  # and start this with `docker compose --profile cosyvoice up -d`.
  tts-service:
    profiles: ["cosyvoice"]
    build:
      context: ./tts-service
    ports:
      - "4558:50000"
    volumes:
      - tts-models:/opt/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  libretranslate:
    image: libretranslate/libretranslate
    ports:
      - "5000:5000"
    environment:
      - LT_LOAD_ONLY=en,zh
      - LT_DISABLE_WEB_UI=true
      - LT_DISABLE_FILES_TRANSLATION=true
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped

  # NOTE: PostgreSQL is provided by the HOST machine (systemd `postgresql`),
  # which already holds the lexiflow_db database. backend-node reaches it via
  # host.docker.internal (see that service). No DB container is run here.

volumes:
  # Caches the downloaded Fun-CosyVoice3-0.5B-2512 model across container
  # restarts/rebuilds so it isn't re-fetched every time (see tts-service/entrypoint.sh).
  tts-models:
