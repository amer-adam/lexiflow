services:
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
        - VITE_AUTH0_DOMAIN=${VITE_AUTH0_DOMAIN}
        - VITE_AUTH0_CLIENT_ID=${VITE_AUTH0_CLIENT_ID}
        - VITE_AUTH0_AUDIENCE=${VITE_AUTH0_AUDIENCE}
    ports:
      - "4555:80"
    restart: unless-stopped
    depends_on:
      - backend-node
    # `docker compose up --watch frontend` rebuilds this image whenever a file
    # under ./frontend changes (node_modules/dist are ignored).
    develop:
      watch:
        - action: rebuild
          path: ./frontend
          ignore:
            - node_modules/
            - dist/
            - .parcel-cache/

  backend-node:
    image: ghcr.io/amer-adam/backend-node:latest
    build:
      context: ./backend-node
    ports:
      - "4556:4556"
    env_file:
      - .env
    # Reach the host's PostgreSQL from inside the container. This overrides the
    # DATABASE_URL in .env (which uses "localhost" for host/native runs).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql://lexiflow_user:lexiflow_password@host.docker.internal:5432/lexiflow_db?schema=public
      # Reach the FastAPI worker by its compose service name, not localhost
      # (inside this container "localhost" is backend-node itself).
      - PYTHON_API=http://backend-fastapi:4557
    restart: unless-stopped
    depends_on:
      - backend-fastapi

  backend-fastapi:
    build:
      context: ./backend-fastapi
    ports:
      - "4557:4557"
    environment:
      # Translation backend (transcript translation, the /translate-text endpoint, and
      # quiz judging/distractor generation all share this) - "deepseek" (default,
      # deepseek-v4-flash) or "groq" (qwen/qwen3-32b, reuses GROQ_API_KEY set below for
      # Whisper). Swap to compare quality with no code change - see
      # backend-fastapi/src/llm/llmProvider.py.
      - LLM_PROVIDER=deepseek
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - LLM_RATE_LIMIT=60
      - LLM_TRANSLATE_CHUNK_MINUTES=5
      # Whisper transcription backend - "api" (default, calls a remote
      # OpenAI-compatible transcription API, no GPU/CPU model needed) or
      # "faster-whisper"/"whisper" for local inference. See
      # backend-fastapi/src/whisper/apiWhisperContainer.py for provider env vars.
      - WHISPER_IMPLEMENTATION=api
      - WHISPER_API_PROVIDER=groq
      - GROQ_API_KEY=${GROQ_API_KEY}
      - WHISPER_API_RATE_LIMIT=100
      - WHISPER_API_MAX_FILE_MB=50
      # TTS: always edge-tts (cloud-backed, no GPU). The self-hosted
      # CosyVoice GPU TTS path (tts-service) was removed entirely so this
      # whole stack can run on a GPU-less host.
      - EDGE_TTS_API_URL=http://edge-tts:5050
      - EDGE_TTS_VOICE=zh-CN-XiaoxiaoNeural
      - FRONTEND_URL=${FRONTEND_URL}
      - OMP_NUM_THREADS=12
      - MKL_NUM_THREADS=12
      # Usually unnecessary from a home/dev IP - YouTube's bot-check mainly
      # targets datacenter/VPS IPs. Uncomment if you start hitting "Sign in to
      # confirm you're not a bot" locally too; see docker-compose.server.yml
      # for the full explanation and one-time cookies.txt setup.
      # - YTDLP_COOKIES_FILE=/app/cookies.txt
      # - YTDLP_POT_PROVIDER_URL=http://bgutil-pot-provider:4416
    restart: unless-stopped
    depends_on:
      - edge-tts
      # - bgutil-pot-provider

  # OpenAI-compatible wrapper around Microsoft Edge's cloud TTS
  # (github.com/travisvn/openai-edge-tts). No GPU, no model download,
  # reliable even for single-character words. Needs outbound internet access
  # (it calls Microsoft's service).
  edge-tts:
    image: travisvn/openai-edge-tts:latest
    ports:
      - "4559:5050"
    environment:
      - DEFAULT_VOICE=zh-CN-XiaoxiaoNeural
      - DEFAULT_RESPONSE_FORMAT=wav
      - REQUIRE_API_KEY=false
    restart: unless-stopped

  # PO-token sidecar for yt-dlp - see the note above and docker-compose.server.yml.
  # Uncomment alongside YTDLP_POT_PROVIDER_URL above if needed locally.
  # bgutil-pot-provider:
  #   image: brainicism/bgutil-ytdlp-pot-provider:latest
  #   restart: unless-stopped

  # NOTE: PostgreSQL is provided by the HOST machine (systemd `postgresql`),
  # which already holds the lexiflow_db database. backend-node reaches it via
  # host.docker.internal (see that service). No DB container is run here.
