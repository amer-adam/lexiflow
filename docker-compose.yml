services:
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
        - VITE_AUTH0_DOMAIN=${VITE_AUTH0_DOMAIN}
        - VITE_AUTH0_CLIENT_ID=${VITE_AUTH0_CLIENT_ID}
        - VITE_AUTH0_AUDIENCE=${VITE_AUTH0_AUDIENCE}
    ports:
      - "4555:80"
    restart: unless-stopped
    depends_on:
      - backend-node
    # `docker compose up --watch frontend` rebuilds this image whenever a file
    # under ./frontend changes (node_modules/dist are ignored).
    develop:
      watch:
        - action: rebuild
          path: ./frontend
          ignore:
            - node_modules/
            - dist/
            - .parcel-cache/

  backend-node:
    image: ghcr.io/amer-adam/backend-node:latest
    build:
      context: ./backend-node
    ports:
      - "4556:4556"
    env_file:
      - .env
    # Reach the host's PostgreSQL from inside the container. This overrides the
    # DATABASE_URL in .env (which uses "localhost" for host/native runs).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql://lexiflow_user:lexiflow_password@host.docker.internal:5432/lexiflow_db?schema=public
      # Reach the FastAPI worker by its compose service name, not localhost
      # (inside this container "localhost" is backend-node itself).
      - PYTHON_API=http://backend-fastapi:4557
    restart: unless-stopped
    depends_on:
      - backend-fastapi

  backend-fastapi:
    build:
      context: ./backend-fastapi
    ports:
      - "4557:4557"
    environment:
      - TRANSLATION_API_URL=http://libretranslate:5000/translate
      - FRONTEND_URL=${FRONTEND_URL}
      - OMP_NUM_THREADS=12
      - MKL_NUM_THREADS=12
    restart: unless-stopped
    depends_on:
      - libretranslate



  libretranslate:
    image: libretranslate/libretranslate
    ports:
      - "5000:5000"
    environment:
      - LT_LOAD_ONLY=en,zh
      - LT_DISABLE_WEB_UI=true
      - LT_DISABLE_FILES_TRANSLATION=true
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped

  # NOTE: PostgreSQL is provided by the HOST machine (systemd `postgresql`),
  # which already holds the lexiflow_db database. backend-node reaches it via
  # host.docker.internal (see that service). No DB container is run here.
