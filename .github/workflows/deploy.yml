name: Build and Deploy Lexiflow Image

on:
  push:
    branches:
      - main
    paths:
      - 'backend-node/**'
      - '.github/workflows/deploy.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Log into GitHub Container Registry to push the image
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Built-in token, no setup needed

      # 2. Build the Docker image and push it to GHCR
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-node
          push: true
          # Tags it as 'latest' and converts to lowercase automatically
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest 

      # 3. Connect to Tencent Server and Deploy
      - name: Deploy to Tencent Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Log the server into GHCR using your PAT so it can pull private images
            echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Navigate to where your docker-compose.yml lives on the server
            cd ~/lexiflow
            
            # Create/Update .env file from GitHub Secrets
            echo "${{ secrets.ENV_FILE }}" > .env
            
            # Pull the brand new image from GitHub
            docker compose pull
            
            # Restart the container with the new image in the background
            docker compose up -d
            
            # Clean up old, unused images to save disk space on your 40GB drive
            docker image prune -f