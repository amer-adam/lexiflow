services:
  backend:
    image: ghcr.io/amer-adam/backend-node:latest
    container_name: lexiflow-express-app
    restart: always
    ports:
      - "4556:4556"
    depends_on:
      - db
      - backend-fastapi
    volumes:
      - ./.env:/app/.env
    environment:
      # Override whatever the mounted .env has for these - point at the
      # containers on this compose network instead of wherever they used to
      # run (e.g. the dev's own machine via Tailscale/ngrok for PYTHON_API,
      # or host.docker.internal for local-dev Postgres).
      - PYTHON_API=http://backend-fastapi:4557
      - DATABASE_URL=postgresql://lexiflow_user:lexiflow_password@db:5432/lexiflow_db?schema=public

  # Transcription (Whisper API), transcript/title translation, and quiz
  # judging/distractor generation - all API-based, no GPU and no local model
  # inference anywhere. See backend-fastapi/src/whisper/apiWhisperContainer.py
  # and backend-fastapi/src/llm/llmProvider.py for the provider-swap env vars.
  backend-fastapi:
    image: ghcr.io/amer-adam/backend-fastapi:latest
    container_name: lexiflow-fastapi
    restart: always
    depends_on:
      - edge-tts
    # YouTube blocks datacenter/VPS IPs ("Sign in to confirm you're not a
    # bot") even with the mobile-UA + android/ios player_client workaround
    # already in src/download.py and src/captions.py. The fix is real
    # browser cookies - see the YTDLP_COOKIES_FILE note below.
    #
    # cookies.txt must exist on the host BEFORE the first `docker compose up`,
    # or Docker will bind-mount an empty directory in its place instead of
    # failing loudly. One-time setup on the server:
    #   touch ~/lexiflow/cookies.txt
    # Then periodically replace it with a real export (Netscape format, e.g.
    # via the "Get cookies.txt LOCALLY" browser extension, logged into
    # YouTube) when it starts getting rejected again - sessions expire.
    # Never commit cookies.txt to the repo.
    volumes:
      - ./cookies.txt:/app/cookies.txt:ro
    environment:
      # Translation backend (transcript translation, /translate-text, and quiz
      # judging/distractors) - "deepseek" (default) or "groq". Swap with no
      # code change - see backend-fastapi/src/llm/llmProvider.py.
      - LLM_PROVIDER=deepseek
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - LLM_RATE_LIMIT=60
      - LLM_TRANSLATE_CHUNK_MINUTES=5
      # Whisper transcription backend - "api" (Groq by default). See
      # backend-fastapi/src/whisper/apiWhisperContainer.py for provider env vars.
      - WHISPER_IMPLEMENTATION=api
      - WHISPER_API_PROVIDER=groq
      - GROQ_API_KEY=${GROQ_API_KEY}
      - WHISPER_API_RATE_LIMIT=100
      - WHISPER_API_MAX_FILE_MB=50
      - EDGE_TTS_API_URL=http://edge-tts:5050
      - EDGE_TTS_VOICE=zh-CN-XiaoxiaoNeural
      - FRONTEND_URL=${FRONTEND_URL}
      - YTDLP_COOKIES_FILE=/app/cookies.txt

  # OpenAI-compatible wrapper around Microsoft Edge's cloud TTS. No GPU, no
  # model download. Internal-only - only backend-fastapi talks to it.
  edge-tts:
    image: travisvn/openai-edge-tts:latest
    container_name: lexiflow-edge-tts
    restart: always
    environment:
      - DEFAULT_VOICE=zh-CN-XiaoxiaoNeural
      - DEFAULT_RESPONSE_FORMAT=wav
      - REQUIRE_API_KEY=false

  db:
    image: postgres:15-alpine
    container_name: lexiflow-postgres
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=lexiflow_user
      - POSTGRES_PASSWORD=lexiflow_password
      - POSTGRES_DB=lexiflow_db

volumes:
  pgdata:
